<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC APP || Designed by Akki</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           THEME VARIABLES & BASE CONFIGS
           ========================================================================== */
        :root {
            --bg-dark: #0a0b10;
            --panel-glass: rgba(18, 20, 32, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-muted: #8a8eaf;
            
            /* Cyberpunk Palette Neon Signals */
            --neon-purple: #9d4edd;
            --neon-blue: #00f5d4;
            --neon-pink: #ff007f;
            --accent-gradient: linear-gradient(135deg, #ff007f 0%, #7b2cbf 50%, #00f5d4 100%);
            --glow-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .theme-synthwave {
            --bg-dark: #12041d;
            --panel-glass: rgba(30, 11, 42, 0.7);
            --neon-purple: #ff71ce;
            --neon-blue: #01cdfe;
            --neon-pink: #b967ff;
            --accent-gradient: linear-gradient(135deg, #ff71ce, #01cdfe);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack);
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dynamic Ambient Background Pods */
        .bg-gradients {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            filter: blur(140px);
            opacity: 0.45;
            top: 0;
            left: 0;
        }

        .gradient-sphere {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: floatingOrb 25s infinite alternate ease-in-out;
        }

        .g1 { width: 500px; height: 500px; background: var(--neon-purple); top: -10%; left: -10%; }
        .g2 { width: 600px; height: 600px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .g3 { width: 400px; height: 400px; background: var(--neon-blue); top: 40%; left: 50%; animation-delay: -10s; }

        @keyframes floatingOrb {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(60px, -40px) scale(1.1); }
            100% { transform: translate(-40px, 50px) scale(0.9); }
        }

        /* ==========================================================================
           APP CONTAINER HOUSING (GLASSMORPHISM WRAP)
           ========================================================================== */
        .app-container {
            display: flex;
            width: 92vw;
            height: 88vh;
            max-width: 1400px;
            max-height: 900px;
            background: var(--panel-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* ==========================================================================
           SIDEBAR & PLAYLIST VIEW ARCHITECTURE
           ========================================================================== */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: rgba(5, 6, 10, 0.3);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .brand i {
            font-size: 24px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand h2 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .brand h2 span { color: var(--neon-blue); }

        /* Upload Hot-Zone */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 24px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--neon-purple);
            background: rgba(157, 78, 221, 0.08);
            box-shadow: inset 0 0 15px rgba(157, 78, 221, 0.1);
            transform: translateY(-2px);
        }
        .upload-zone i {
            font-size: 32px;
            color: var(--neon-blue);
            margin-bottom: 12px;
        }
        .upload-zone p { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .upload-zone span { font-size: 11px; color: var(--text-muted); }
        .upload-zone input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        /* Search Box Container */
        .search-box {
            position: relative;
            margin-bottom: 24px;
        }
        .search-box i {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-box input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.2);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .playlist-header h3 { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .playlist-header span { font-size: 12px; color: var(--neon-purple); font-weight: 600; }

        .playlist-tracks {
            flex: 1;
            overflow-y: auto;
            margin-right: -10px;
            padding-right: 10px;
        }
        .playlist-tracks::-webkit-scrollbar { width: 5px; }
        .playlist-tracks::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* Track Rows Styles */
        .track-row {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .track-row:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }
        .track-row.active {
            background: rgba(157, 78, 221, 0.15);
            border-color: rgba(157, 78, 221, 0.3);
        }
        .row-art {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #2c3e50, #000);
            display: flex; align-items: center; justify-content: center;
            margin-right: 14px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .track-row.active .row-art {
            background: var(--accent-gradient);
            color: white;
            animation: pulseGlow 2s infinite;
        }
        .row-details { flex: 1; min-width: 0; }
        .row-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-row.active .row-title { color: var(--neon-blue); }
        .row-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .row-actions { display: flex; align-items: center; gap: 10px; }
        .delete-track-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; transition: color 0.2s;
        }
        .delete-track-btn:hover { color: var(--neon-pink); }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 200px; color: var(--text-muted); text-align: center; gap: 14px;
        }
        .empty-state i { font-size: 32px; opacity: 0.5; }

        /* ==========================================================================
           MAIN MEDIA WORKSPACE UI
           ========================================================================== */
        .player-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
            justify-content: space-between;
        }

        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
        }
        .theme-toggle {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.05); padding: 8px 16px;
            border-radius: 20px; border: 1px solid var(--border-glass);
            cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s;
        }
        .theme-toggle:hover { background: rgba(255, 255, 255, 0.1); color: var(--neon-blue); }
        .fullscreen-toggle {
            cursor: pointer; width: 36px; height: 36px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-glass); transition: all 0.3s;
        }
        .fullscreen-toggle:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.1); }

        /* Fluid Audio Visualizer Box */
        .visualizer-container {
            position: absolute;
            top: 15%; left: 5%; width: 90%; height: 35%;
            z-index: 1;
            pointer-events: none;
        }
        #visualizer { width: 100%; height: 100%; opacity: 0.6; }

        /* Now Playing Display Core Hero */
        .now-playing-display {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; margin: auto 0; z-index: 2;
        }
        .album-art-wrapper {
            position: relative; margin-bottom: 28px;
        }
        .album-art {
            width: 240px; height: 240px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 72px; color: rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .album-art-wrapper .glow-ring {
            position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 28px; background: var(--accent-gradient);
            z-index: -1; opacity: 0; filter: blur(12px); transition: opacity 0.5s;
        }
        /* Trigger changes on playback pulse state */
        .playing .album-art {
            transform: scale(1.04);
            border-color: transparent;
            background: rgba(10, 10, 15, 0.8);
            color: var(--neon-purple);
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
        }
        .playing .glow-ring { opacity: 0.65; }

        .track-meta h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; max-width: 500px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .track-meta p { color: var(--text-muted); font-size: 15px; }

        /* ==========================================================================
           DOCK CONTROLS & SELECTION TIMELINES
           ========================================================================== */
        .controls-dock {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            padding: 24px; border-radius: 20px; z-index: 2;
            backdrop-filter: blur(10px);
        }

        /* Seek Timeline Progress */
        .progress-container {
            display: flex; align-items: center; justify-content: space-between;
            gap: 14px; margin-bottom: 20px;
        }
        .time-stamp { font-size: 12px; color: var(--text-muted); font-family: monospace; width: 45px;}
        #time-current { text-align: left; }
        #time-total { text-align: right; }

        .progress-bar-wrapper {
            flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1);
            border-radius: 3px; position: relative; cursor: pointer;
            transition: height 0.2s;
        }
        .progress-bar-wrapper:hover { height: 8px; }
        .progress-fill {
            height: 100%; width: 0%; background: var(--accent-gradient);
            border-radius: 3px; position: relative;
        }
        .progress-handle {
            position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
            width: 12px; height: 12px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-purple); transition: transform 0.1s;
        }
        .progress-bar-wrapper:hover .progress-handle { transform: translateY(-50%) scale(1); }

        /* Control Buttons Cluster */
        .buttons-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .utility-controls { width: 80px; display: flex; }
        #shuffle-btn { justify-content: flex-start; }
        #repeat-btn { justify-content: flex-end; }

        .core-controls {
            display: flex; align-items: center; gap: 24px;
        }

        .ctrl-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 18px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:hover { color: var(--text-primary); transform: scale(1.08); }
        .ctrl-btn.active {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.5);
        }

        .ctrl-btn.main-play {
            width: 56px; height: 56px; border-radius: 50%;
            background: white; color: black; font-size: 20px;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }
        .ctrl-btn.main-play:hover {
            transform: scale(1.06);
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.6);
        }

        /* Bottom accessory alignment */
        .accessory-rack {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 14px;
        }
        .volume-container { display: flex; align-items: center; gap: 10px; }
        .volume-container i { color: var(--text-muted); font-size: 14px; width: 18px;}
        .volume-container input {
            -webkit-appearance: none; appearance: none;
            width: 100px; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; outline: none;
        }
        .volume-container input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            border-radius: 50%; background: white; cursor: pointer;
            transition: transform 0.1s;
        }
        .volume-container input::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .shortcut-tip { font-size: 11px; color: var(--text-muted); display: flex; gap: 14px; }
        .shortcut-tip kbd {
            background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;
            font-family: monospace; border: 1px solid rgba(255,255,255,0.05); margin-right: 2px;
        }

        /* ==========================================================================
           TOASTY TOAST ALERTS NOTIFICATIONS
           ========================================================================== */
        .toast-container {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 10px; z-index: 9999;
        }
        .toast {
            background: rgba(15, 17, 28, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); padding: 14px 24px;
            border-radius: 12px; color: white; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateX(120%); animation: slideIn 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border-left: 4px solid var(--neon-blue);
        }
        @keyframes slideIn { to { transform: translateX(0); } }
        .toast.fade-out { animation: slideOut 0.3s forwards ease-in; }
        @keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }

        /* ==========================================================================
           RESPONSIVE LAYOUT SCALING DESIGN
           ========================================================================== */
        @media (max-width: 992px) {
            .app-container { flex-direction: column; height: 95vh; width: 95vw; }
            .sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid var(--border-glass); padding: 20px; }
            .player-main { height: 60%; padding: 24px; }
            .album-art { width: 140px; height: 140px; font-size: 44px; border-radius: 16px;}
            .visualizer-container { height: 20%; top: 25%; }
            .track-meta h1 { font-size: 20px; }
        }

        @media (max-width: 500px) {
            .sidebar { height: 45%; }
            .player-main { height: 55%; }
            .upload-zone { padding: 12px; margin-bottom: 12px; }
            .upload-zone i { font-size: 22px; margin-bottom: 4px; }
            .search-box { margin-bottom: 12px; }
            .shortcut-tip { display: none; }
            .album-art { width: 100px; height: 100px; font-size: 32px; }
        }

        /* Fullscreen Immersion layout shifts */
        :fullscreen .app-container { width: 100vw; height: 100vh; max-width: none; max-height: none; border-radius: 0; }
        :fullscreen .sidebar { display: none; }
    </style>
</head>
<body class="theme-cyberpunk">
    <!-- Animated Background Gradients -->
    <div class="bg-gradients">
        <div class="gradient-sphere g1"></div>
        <div class="gradient-sphere g2"></div>
        <div class="gradient-sphere g3"></div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR / PLAYLIST & UPLOAD -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid to-purple fa-bolt-lightning"></i>
                <h2>AKKI<span>MUSIC</span></h2>
            </div>

            <!-- Drag and Drop Zone -->
            <div class="upload-zone" id="drop-zone">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Drag & Drop Audio Files</p>
                <span>Supports MP3, WAV, M4A</span>
                <input type="file" id="file-input" multiple accept="audio/mp3, audio/wav, audio/x-m4a, audio/mpeg">
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search playlist...">
            </div>

            <!-- Playlist View -->
            <div class="playlist-header">
                <h3>Your Library</h3>
                <span id="track-count">0 tracks</span>
            </div>
            <div class="playlist-tracks" id="playlist-container">
                <div class="empty-state">
                    <i class="fa-solid fa-compact-disc fa-spin"></i>
                    <p>No tracks uploaded yet.</p>
                </div>
            </div>
        </aside>

        <!-- MAIN PLAYER AREA -->
        <main class="player-main">
            <!-- Top Controls Header -->
            <header class="top-nav">
                <div class="theme-toggle" id="theme-btn" title="Toggle Theme Layout">
                    <i class="fa-solid fa-palette"></i>
                    <span>Switch Aesthetic</span>
                </div>
                <div class="fullscreen-toggle" id="fullscreen-btn" title="Fullscreen Mode">
                    <i class="fa-solid fa-expand"></i>
                </div>
            </header>

            <!-- Visualizer Container -->
            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <!-- Active Track Big Card -->
            <div class="now-playing-display">
                <div class="album-art-wrapper">
                    <div class="album-art" id="main-art">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div class="glow-ring"></div>
                </div>
                <div class="track-meta">
                    <h1 id="main-title">Welcome to AKKI MUSIC</h1>
                    <p id="main-artist">Upload music to start jamming</p>
                </div>
            </div>

            <!-- Playback Controls Dock -->
            <div class="controls-dock">
                <!-- Progress Bar Section -->
                <div class="progress-container">
                    <span class="time-stamp" id="time-current">0:00</span>
                    <div class="progress-bar-wrapper" id="progress-wrapper">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-handle"></div>
                    </div>
                    <span class="time-stamp" id="time-total">0:00</span>
                </div>

                <!-- Action Button Cluster -->
                <div class="buttons-container">
                    <div class="utility-controls">
                        <button id="shuffle-btn" class="ctrl-btn" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
                    </div>

                    <div class="core-controls">
                        <button id="prev-btn" class="ctrl-btn secondary" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="play-btn" class="ctrl-btn main-play" title="Play/Pause"><i class="fa-solid fa-play"></i></button>
                        <button id="next-btn" class="ctrl-btn secondary" title="Next"><i class="fa-solid fa-forward-step"></i></button>
                    </div>

                    <div class="utility-controls">
                        <button id="repeat-btn" class="ctrl-btn" title="Repeat Mode"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                </div>

                <!-- Bottom Accessory Rack -->
                <div class="accessory-rack">
                    <div class="volume-container">
                        <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                    </div>
                    <div class="shortcut-tip">
                        <span><kbd>Space</kbd> Play/Pause</span>
                        <span><kbd>➔</kbd> Seek</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Audio Element -->
    <audio id="audio-element" crossorigin="anonymous"></audio>

    <!-- ==========================================================================
       MEDIA CORE ARCHITECTURE ENGINE
       ========================================================================== */ -->
    <script>
        class AKKIMUSICPlayer  {
            constructor() {
                this.tracks = [];
                this.currentIndex = -1;
                this.isPlaying = false;
                this.isShuffle = false;
                this.isRepeat = false;

                this.audioCtx = null;
                this.analyser = null;
                this.sourceNode = null;

                this.initElements();
                this.initEvents();
                this.setupVisualizerCanvas();
                this.showInitialAlert();
            }

            initElements() {
                this.audio = document.getElementById('audio-element');
                this.playBtn = document.getElementById('play-btn');
                this.prevBtn = document.getElementById('prev-btn');
                this.nextBtn = document.getElementById('next-btn');
                this.shuffleBtn = document.getElementById('shuffle-btn');
                this.repeatBtn = document.getElementById('repeat-btn');
                this.themeBtn = document.getElementById('theme-btn');
                this.fullscreenBtn = document.getElementById('fullscreen-btn');
                
                this.progressWrapper = document.getElementById('progress-wrapper');
                this.progressFill = document.getElementById('progress-fill');
                this.timeCurrent = document.getElementById('time-current');
                this.timeTotal = document.getElementById('time-total');
                this.volumeSlider = document.getElementById('volume-slider');
                this.volumeIcon = document.getElementById('volume-icon');
                
                this.fileInput = document.getElementById('file-input');
                this.dropZone = document.getElementById('drop-zone');
                this.searchInput = document.getElementById('search-input');
                this.playlistContainer = document.getElementById('playlist-container');
                this.trackCountLabel = document.getElementById('track-count');
                
                this.mainArt = document.getElementById('main-art');
                this.mainTitle = document.getElementById('main-title');
                this.mainArtist = document.getElementById('main-artist');
                this.nowPlayingDisplay = document.querySelector('.now-playing-display');
                this.canvas = document.getElementById('visualizer');
                this.canvasCtx = this.canvas.getContext('2d');
            }

            initEvents() {
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.prevTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());
                this.shuffleBtn.addEventListener('click', () => this.toggleShuffle());
                this.repeatBtn.addEventListener('click', () => this.toggleRepeat());
                this.themeBtn.addEventListener('click', () => this.switchTheme());
                this.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());

                this.audio.addEventListener('timeupdate', () => this.updateProgressBar());
                this.audio.addEventListener('loadedmetadata', () => this.displayDuration());
                this.audio.addEventListener('ended', () => this.handleTrackEnd());
                this.progressWrapper.addEventListener('click', (e) => this.seekTimeline(e));

                this.volumeSlider.addEventListener('input', (e) => this.setVolume(e.target.value));

                this.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                this.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); this.dropZone.classList.add('dragover'); });
                this.dropZone.addEventListener('dragleave', () => this.dropZone.classList.remove('dragover'));
                this.dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.dropZone.classList.remove('dragover');
                    if(e.dataTransfer.files.length) this.handleFiles(e.dataTransfer.files);
                });

                this.searchInput.addEventListener('input', (e) => this.filterPlaylist(e.target.value));

                window.addEventListener('keydown', (e) => {
                    if (document.activeElement.tagName === 'INPUT') return;
                    if (e.code === 'Space') { e.preventDefault(); this.togglePlay(); }
                    else if (e.code === 'ArrowRight') { this.audio.currentTime = Math.min(this.audio.duration, this.audio.currentTime + 5); }
                    else if (e.code === 'ArrowLeft') { this.audio.currentTime = Math.max(0, this.audio.currentTime - 5); }
                });

                window.addEventListener('resize', () => this.setupVisualizerCanvas());
            }

            showInitialAlert() {
                setTimeout(() => {
                    this.showToast("System Online. Drop music files to start!", "blue");
                }, 800);
            }

            handleFiles(fileList) {
                let filesAddedCount = 0;
                Array.from(fileList).forEach(file => {
                    if (!file.type.match('audio.*') && !file.name.endsWith('.m4a')) {
                        this.showToast(`Unsupported format: ${file.name}`, 'pink');
                        return;
                    }

                    const objectUrl = URL.createObjectURL(file);
                    const structuredTitle = file.name.replace(/\.[^/.]+$/, "");

                    const newTrack = {
                        id: 'track_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                        title: structuredTitle,
                        artist: 'Local Media',
                        url: objectUrl
                    };

                    this.tracks.push(newTrack);
                    filesAddedCount++;
                });

                if(filesAddedCount > 0) {
                    this.showToast(`Imported ${filesAddedCount} songs!`);
                    this.renderPlaylist();
                    if (this.currentIndex === -1) {
                        this.selectTrack(0, false);
                    }
                }
            }

            renderPlaylist(filteredTracks = null) {
                const targetList = filteredTracks || this.tracks;
                
                if (this.tracks.length === 0) {
                    this.playlistContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-compact-disc fa-spin"></i>
                            <p>No tracks uploaded yet.</p>
                        </div>`;
                    this.trackCountLabel.innerText = "0 tracks";
                    return;
                }

                this.trackCountLabel.innerText = `${this.tracks.length} track${this.tracks.length > 1 ? 's' : ''}`;
                this.playlistContainer.innerHTML = '';

                targetList.forEach((track) => {
                    const indexInMaster = this.tracks.findIndex(t => t.id === track.id);
                    const isActive = indexInMaster === this.currentIndex;

                    const row = document.createElement('div');
                    row.className = `track-row ${isActive ? 'active' : ''}`;
                    row.innerHTML = `
                        <div class="row-art">
                            <i class="fa-solid ${isActive && this.isPlaying ? 'fa-waveform' : 'fa-music'}"></i>
                        </div>
                        <div class="row-details">
                            <div class="row-title">${track.title}</div>
                            <div class="row-artist">${track.artist}</div>
                        </div>
                        <div class="row-actions">
                            <button class="delete-track-btn" data-id="${track.id}"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `;

                    row.addEventListener('click', (e) => {
                        if (e.target.closest('.delete-track-btn')) return;
                        this.selectTrack(indexInMaster, true);
                    });

                    row.querySelector('.delete-track-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteTrack(track.id);
                    });

                    this.playlistContainer.appendChild(row);
                });
            }

            selectTrack(index, autostart = true) {
                if (index < 0 || index >= this.tracks.length) return;
                
                this.currentIndex = index;
                const track = this.tracks[this.currentIndex];

                this.audio.src = track.url;
                this.mainTitle.innerText = track.title;
                this.mainArtist.innerText = track.artist;
                
                this.renderPlaylist();
                
                if (autostart) this.play();
                else this.pause();
            }

            deleteTrack(id) {
                const targetIndex = this.tracks.findIndex(t => t.id === id);
                if (targetIndex === -1) return;

                URL.revokeObjectURL(this.tracks[targetIndex].url);
                this.tracks.splice(targetIndex, 1);

                if (this.tracks.length === 0) {
                    this.currentIndex = -1;
                    this.audio.src = '';
                    this.mainTitle.innerText = "Welcome to NeonPulse";
                    this.mainArtist.innerText = "Upload music to start jamming";
                    this.pause();
                } else if (targetIndex === this.currentIndex) {
                    const nextIndex = targetIndex >= this.tracks.length ? 0 : targetIndex;
                    this.selectTrack(nextIndex, this.isPlaying);
                } else if (targetIndex < this.currentIndex) {
                    this.currentIndex--;
                }

                this.renderPlaylist();
                this.showToast("Track removed", "pink");
            }

            filterPlaylist(query) {
                if(!query.trim()) {
                    this.renderPlaylist();
                    return;
                }
                const filtered = this.tracks.filter(t => t.title.toLowerCase().includes(query.toLowerCase()));
                this.renderPlaylist(filtered);
            }

            togglePlay() {
                if (this.currentIndex === -1 && this.tracks.length > 0) {
                    this.selectTrack(0, true);
                    return;
                }
                if (this.currentIndex === -1) return;

                if (this.isPlaying) this.pause();
                else this.play();
            }

            play() {
                if (!this.audioCtx) this.initAudioAnalyzer();
                
                this.audio.play().then(() => {
                    this.isPlaying = true;
                    this.playBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
                    this.nowPlayingDisplay.classList.add('playing');
                }).catch(err => {
                    console.error("Audio Context playback blocked:", err);
                    this.showToast("Playback stalled. Try clicking track directly.", "pink");
                });
            }

            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.playBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                this.nowPlayingDisplay.classList.remove('playing');
            }

            nextTrack() {
                if (this.tracks.length === 0) return;
                if (this.isShuffle) {
                    let randomIndex = Math.floor(Math.random() * this.tracks.length);
                    this.selectTrack(randomIndex, true);
                } else {
                    let nextIndex = this.currentIndex + 1;
                    if (nextIndex >= this.tracks.length) nextIndex = 0;
                    this.selectTrack(nextIndex, true);
                }
            }

            prevTrack() {
                if (this.tracks.length === 0) return;
                let prevIndex = this.currentIndex - 1;
                if (prevIndex < 0) prevIndex = this.tracks.length - 1;
                this.selectTrack(prevIndex, true);
            }

            toggleShuffle() {
                this.isShuffle = !this.isShuffle;
                this.shuffleBtn.classList.toggle('active', this.isShuffle);
                this.showToast(this.isShuffle ? "Shuffle Active" : "Shuffle Disabled");
            }

            toggleRepeat() {
                this.isRepeat = !this.isRepeat;
                this.repeatBtn.classList.toggle('active', this.isRepeat);
                this.showToast(this.isRepeat ? "Looping Current Track" : "Sequence Mode");
            }

            handleTrackEnd() {
                if (this.isRepeat) {
                    this.audio.currentTime = 0;
                    this.play();
                } else {
                    this.nextTrack();
                }
            }

            updateProgressBar() {
                if (!this.audio.duration) return;
                const percentage = (this.audio.currentTime / this.audio.duration) * 100;
                this.progressFill.style.width = `${percentage}%`;
                this.timeCurrent.innerText = this.formatTime(this.audio.currentTime);
            }

            displayDuration() {
                this.timeTotal.innerText = this.formatTime(this.audio.duration);
            }

            seekTimeline(e) {
                if (!this.audio.duration) return;
                const boundingBox = this.progressWrapper.getBoundingClientRect();
                const clickPositionX = e.clientX - boundingBox.left;
                this.audio.currentTime = (clickPositionX / boundingBox.width) * this.audio.duration;
            }

            setVolume(value) {
                this.audio.volume = value;
                if(value == 0) this.volumeIcon.className = "fa-solid fa-volume-xmark";
                else if(value < 0.4) this.volumeIcon.className = "fa-solid fa-volume-low";
                else this.volumeIcon.className = "fa-solid fa-volume-high";
            }

            formatTime(seconds) {
                if (isNaN(seconds)) return "0:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            initAudioAnalyzer() {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioCtx.createAnalyser();
                    this.sourceNode = this.audioCtx.createMediaElementSource(this.audio);
                    this.sourceNode.connect(this.analyser);
                    this.analyser.connect(this.audioCtx.destination);
                    
                    this.analyser.fftSize = 128; 
                    this.bufferLength = this.analyser.frequencyBinCount;
                    this.dataArray = new Uint8Array(this.bufferLength);
                    
                    this.drawVisualizerFrame();
                } catch(e) {
                    console.warn("Web Audio Sandbox initialized without continuous context rendering: ", e);
                }
            }

            setupVisualizerCanvas() {
                this.canvas.width = this.canvas.parentElement.clientWidth;
                this.canvas.height = this.canvas.parentElement.clientHeight;
            }

            drawVisualizerFrame() {
                requestAnimationFrame(() => this.drawVisualizerFrame());
                if(!this.analyser) return;

                this.analyser.getByteFrequencyData(this.dataArray);
                this.canvasCtx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                const barWidth = (this.canvas.width / this.bufferLength) * 1.4;
                let barHeight;
                let x = 0;

                for (let i = 0; i < this.bufferLength; i++) {
                    barHeight = this.dataArray[i] * 0.75;

                    const baseGlowGradient = this.canvasCtx.createLinearGradient(0, this.canvas.height, 0, this.canvas.height - barHeight);
                    baseGlowGradient.addColorStop(0, '#7b2cbf');
                    baseGlowGradient.addColorStop(0.5, '#ff007f');
                    baseGlowGradient.addColorStop(1, '#00f5d4');

                    this.canvasCtx.fillStyle = baseGlowGradient;
                    this.canvasCtx.beginPath();
                    if(this.canvasCtx.roundRect) {
                        this.canvasCtx.roundRect(x, this.canvas.height - barHeight, barWidth - 4, barHeight, 4);
                    } else {
                        this.canvasCtx.rect(x, this.canvas.height - barHeight, barWidth - 4, barHeight);
                    }
                    this.canvasCtx.fill();

                    x += barWidth;
                }
            }

            switchTheme() {
                const body = document.body;
                if(body.classList.contains('theme-cyberpunk')) {
                    body.className = 'theme-synthwave';
                    this.showToast("Theme: Synthwave Pink");
                } else {
                    body.className = 'theme-cyberpunk';
                    this.showToast("Theme: Cyberpunk Neon");
                }
            }

            toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {
                        this.showToast("Fullscreen restricted", "pink");
                    });
                } else {
                    document.exitFullscreen();
                }
            }

            showToast(message, colorType = 'blue') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                if(colorType === 'pink') toast.style.borderLeftColor = 'var(--neon-pink)';
                
                toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> <span>${message}</span>`;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('fade-out');
                    toast.addEventListener('animationend', () => toast.remove());
                }, 3200);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.AppInstance = new NeonPulsePlayer();
        });
    </script>
</body>
</html>
