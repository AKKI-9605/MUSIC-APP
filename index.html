<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKKI MUSIC// Mobile Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-glass: rgba(18, 20, 32, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-muted: #8a8eaf;
            --neon-purple: #9d4edd;
            --neon-blue: #00f5d4;
            --neon-pink: #ff007f;
            --accent-gradient: linear-gradient(135deg, #ff007f 0%, #7b2cbf 50%, #00f5d4 100%);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 10px; position: relative;
        }

        .app-container {
            display: flex; flex-direction: column; width: 100%; max-width: 500px;
            background: var(--panel-glass); border: 1px solid var(--border-glass);
            border-radius: 24px; padding: 20px; gap: 20px; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5); z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; justify-content: center; }
        .brand i { font-size: 24px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand h2 { font-size: 20px; font-weight: 800; letter-spacing: 2px; }

        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 16px;
            padding: 25px; text-align: center; position: relative; background: rgba(255, 255, 255, 0.02);
        }
        .upload-zone i { font-size: 32px; color: var(--neon-blue); margin-bottom: 8px; }
        .upload-zone input { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }

        .stream-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); padding: 12px; border-radius: 14px; }
        .stream-input-wrap { display: flex; gap: 8px; margin-top: 5px; }
        .stream-input-wrap input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 8px; padding: 10px; color: white; outline: none; font-size: 14px; }
        .stream-input-wrap button { background: var(--accent-gradient); border: none; color: white; padding: 0 16px; border-radius: 8px; font-weight: 600; }

        .playlist-tracks { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 5px; }
        .track-row { display: flex; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; background: rgba(255,255,255,0.02); }
        .track-row.active { background: rgba(157, 78, 221, 0.2); border-left: 3px solid var(--neon-blue); }
        .row-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .now-playing { text-align: center; margin: 10px 0; }
        .now-playing h1 { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-playing p { color: var(--text-muted); font-size: 12px; }

        .controls-dock { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); padding: 15px; border-radius: 16px; }
        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .time-stamp { font-size: 11px; color: var(--text-muted); font-family: monospace; }
        .progress-bar-wrapper { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent-gradient); border-radius: 3px; }
        
        .buttons-container { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .ctrl-btn { background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; }
        .ctrl-btn.main-play { width: 55px; height: 55px; border-radius: 50%; background: white; color: black; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; z-index: 1; pointer-events: none; opacity: 0.4; }
        .toast-container { position: fixed; top: 20px; width: 90%; max-width: 400px; z-index: 9999; }
        .toast { background: #0f111c; border-left: 4px solid var(--neon-blue); padding: 12px; border-radius: 8px; text-align: center; font-size: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>

    <div class="app-container">
        <div class="brand">
            <i class="fa-solid fa-bolt-lightning"></i>
            <h2>AKKI<span>MUSIC</span></h2>
        </div>

        <!-- FILE UPLOAD -->
        <div class="upload-zone" id="drop-area">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Tap to Select Music Files</p>
            <input type="file" id="file-input" multiple accept="audio/*">
        </div>

        <!-- STREAM BOX -->
        <div class="stream-box">
            <h4 style="font-size: 11px; color: var(--neon-pink)">STREAM URL / YOUTUBE</h4>
            <div class="stream-input-wrap">
                <input type="text" id="stream-input" placeholder="Paste link here...">
                <button id="stream-submit-btn">Load</button>
            </div>
        </div>

        <!-- TRACKLIST -->
        <div class="playlist-tracks" id="playlist-container">
            <div style="text-align: center; color: var(--text-muted); padding: 20px; font-size: 13px;">No tracks loaded yet.</div>
        </div>

        <!-- NOW PLAYING -->
        <div class="now-playing">
            <h1 id="main-title">Ready for Track</h1>
            <p id="main-artist">Select a file above</p>
        </div>

        <!-- CONTROLS -->
        <div class="controls-dock">
            <div class="progress-container">
                <span class="time-stamp" id="time-current">0:00</span>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-stamp" id="time-total">0:00</span>
            </div>

            <div class="buttons-container">
                <button id="prev-btn" class="ctrl-btn"><i class="fa-solid fa-backward"></i></button>
                <button id="play-btn" class="ctrl-btn main-play"><i class="fa-solid fa-play"></i></button>
                <button id="next-btn" class="ctrl-btn"><i class="fa-solid fa-forward"></i></button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <audio id="audio-element" crossorigin="anonymous" playsinline></audio>

    <script>
        class MobileNeonPlayer {
            constructor() {
                this.tracks = [];
                this.currentIndex = -1;
                this.isPlaying = false;
                this.audioCtx = null;

                this.initElements();
                this.initEvents();
                this.setupCanvas();
            }

            initElements() {
                this.audio = document.getElementById('audio-element');
                this.playBtn = document.getElementById('play-btn');
                this.prevBtn = document.getElementById('prev-btn');
                this.nextBtn = document.getElementById('next-btn');
                this.progressWrapper = document.getElementById('progress-wrapper');
                this.progressFill = document.getElementById('progress-fill');
                this.timeCurrent = document.getElementById('time-current');
                this.timeTotal = document.getElementById('time-total');
                this.fileInput = document.getElementById('file-input');
                this.streamInput = document.getElementById('stream-input');
                this.streamSubmitBtn = document.getElementById('stream-submit-btn');
                this.playlistContainer = document.getElementById('playlist-container');
                this.mainTitle = document.getElementById('main-title');
                this.mainArtist = document.getElementById('main-artist');
                this.canvas = document.getElementById('visualizer');
                this.canvasCtx = this.canvas.getContext('2d');
            }

            initEvents() {
                // Core Touch Unlocks
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.prevTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());

                this.audio.addEventListener('timeupdate', () => {
                    if (!this.audio.duration) return;
                    this.progressFill.style.width = `${(this.audio.currentTime / this.audio.duration) * 100}%`;
                    this.timeCurrent.innerText = this.formatTime(this.audio.currentTime);
                });
                this.audio.addEventListener('loadedmetadata', () => this.timeTotal.innerText = this.formatTime(this.audio.duration));
                this.audio.addEventListener('ended', () => this.nextTrack());
                
                this.progressWrapper.addEventListener('click', (e) => {
                    if (!this.audio.duration) return;
                    const rect = this.progressWrapper.getBoundingClientRect();
                    this.audio.currentTime = ((e.clientX - rect.left) / rect.width) * this.audio.duration;
                });

                this.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                this.streamSubmitBtn.addEventListener('click', () => this.handleWebStream());
                window.addEventListener('resize', () => this.setupCanvas());
            }

            handleFiles(fileList) {
                if (!fileList || fileList.length === 0) return;
                
                Array.from(fileList).forEach(file => {
                    const trackUrl = URL.createObjectURL(file);
                    this.tracks.push({
                        title: file.name.replace(/\.[^/.]+$/, ""),
                        artist: 'Local Audio',
                        url: trackUrl
                    });
                });
                
                this.renderPlaylist();
                // CRITICAL MOBILE ADJUSTMENT: Load the track but DO NOT force auto-play, 
                // letting the user manually click play to bypass security.
                this.selectTrack(this.tracks.length - fileList.length, false);
                this.showToast(`Added ${fileList.length} songs. Tap Play!`);
            }

            handleWebStream() {
                let url = this.streamInput.value.trim();
                if (!url) return;

                let title = "Web Stream";
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    let videoId = "";
                    if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                    else videoId = url.split('v=')[1].split('&')[0];
                    url = `https://piper.com.de/api/yt-stream?id=${videoId}`;
                    title = "YouTube Stream";
                }

                this.tracks.push({ title: title, artist: 'Web Network Source', url: url });
                this.streamInput.value = '';
                this.renderPlaylist();
                this.selectTrack(this.tracks.length - 1, true);
            }

            renderPlaylist() {
                if(this.tracks.length === 0) return;
                this.playlistContainer.innerHTML = '';
                this.tracks.forEach((track, index) => {
                    const active = index === this.currentIndex;
                    const row = document.createElement('div');
                    row.className = `track-row ${active ? 'active' : ''}`;
                    row.innerHTML = `<div class="row-title">${track.title}</div>`;
                    row.addEventListener('click', () => this.selectTrack(index, true));
                    this.playlistContainer.appendChild(row);
                });
            }

            selectTrack(index, autostart = true) {
                if (index < 0 || index >= this.tracks.length) return;
                this.currentIndex = index;
                const track = this.tracks[this.currentIndex];
                this.audio.src = track.url;
                this.audio.load(); // Forces mobile browser to register the source container
                this.mainTitle.innerText = track.title;
                this.mainArtist.innerText = track.artist;
                this.renderPlaylist();
                if (autostart) this.play();
            }

            togglePlay() {
                if (this.currentIndex === -1 && this.tracks.length > 0) return this.selectTrack(0, true);
                if (this.currentIndex === -1) return this.showToast("Upload a track first!");
                this.isPlaying ? this.pause() : this.play();
            }

            play() {
                // Unlock Web Audio Context via explicit User Gesture
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.setupVisualizerEngine();
                }
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }

                this.audio.play().then(() => {
                    this.isPlaying = true;
                    this.playBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
                }).catch(() => this.showToast("Tap track name to play!"));
            }

            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.playBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
            }

            nextTrack() {
                if(this.tracks.length === 0) return;
                let next = this.currentIndex + 1 >= this.tracks.length ? 0 : this.currentIndex + 1;
                this.selectTrack(next, true);
            }

            prevTrack() {
                if(this.tracks.length === 0) return;
                let prev = this.currentIndex - 1 < 0 ? this.tracks.length - 1 : this.currentIndex - 1;
                this.selectTrack(prev, true);
            }

            formatTime(s) {
                if (isNaN(s)) return "0:00";
                const m = Math.floor(s / 60), r = Math.floor(s % 60);
                return `${m}:${r < 10 ? '0' : ''}${r}`;
            }

            setupCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight * 0.3;
            }

            setupVisualizerEngine() {
                try {
                    this.analyser = this.audioCtx.createAnalyser();
                    const source = this.audioCtx.createMediaElementSource(this.audio);
                    source.connect(this.analyser);
                    this.analyser.connect(this.audioCtx.destination);
                    this.analyser.fftSize = 32;
                    this.bufferLength = this.analyser.frequencyBinCount;
                    this.dataArray = new Uint8Array(this.bufferLength);
                    this.renderVisuals();
                } catch(e) { console.log("Visualizer connection bypassed for mobile sandbox restrictions."); }
            }

            renderVisuals() {
                requestAnimationFrame(() => this.renderVisuals());
                if (!this.analyser) return;
                this.analyser.getByteFrequencyData(this.dataArray);
                this.canvasCtx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const barWidth = this.canvas.width / this.bufferLength;
                let x = 0;
                for(let i=0; i<this.bufferLength; i++) {
                    let h = this.dataArray[i] * 0.5;
                    this.canvasCtx.fillStyle = `rgba(0, 245, 212, ${h/255 + 0.2})`;
                    this.canvasCtx.fillRect(x, this.canvas.height - h, barWidth - 4, h);
                    x += barWidth;
                }
            }

            showToast(msg) {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast'; t.innerText = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => { window.AppInstance = new MobileNeonPlayer(); });
    </script>
</body>
</html>
