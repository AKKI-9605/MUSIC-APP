<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONPULSE // Premium Audio Player</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           THEME VARIABLES & BASE CONFIGS
           ========================================================================== */
        :root {
            --bg-dark: #0a0b10;
            --panel-glass: rgba(18, 20, 32, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-muted: #8a8eaf;
            
            --neon-purple: #9d4edd;
            --neon-blue: #00f5d4;
            --neon-pink: #ff007f;
            --accent-gradient: linear-gradient(135deg, #ff007f 0%, #7b2cbf 50%, #00f5d4 100%);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .theme-synthwave {
            --bg-dark: #12041d;
            --panel-glass: rgba(30, 11, 42, 0.8);
            --neon-purple: #ff71ce;
            --neon-blue: #01cdfe;
            --neon-pink: #b967ff;
            --accent-gradient: linear-gradient(135deg, #ff71ce, #01cdfe);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack);
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-gradients {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            filter: blur(140px);
            opacity: 0.45;
            top: 0; left: 0;
        }

        .gradient-sphere {
            position: absolute;
            border-radius: 50%;
        }
        .g1 { width: 500px; height: 500px; background: var(--neon-purple); top: -10%; left: -10%; }
        .g2 { width: 600px; height: 600px; background: var(--neon-pink); bottom: -20%; right: -10%; }
        .g3 { width: 400px; height: 400px; background: var(--neon-blue); top: 40%; left: 50%; }

        /* ==========================================================================
           APP CONTAINER HOUSING
           ========================================================================== */
        .app-container {
            display: flex;
            width: 92vw;
            height: 88vh;
            max-width: 1400px;
            max-height: 900px;
            background: var(--panel-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .sidebar {
            width: 360px;
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 25px;
            background: rgba(5, 6, 10, 0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .brand i {
            font-size: 24px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand h2 { font-size: 20px; font-weight: 800; letter-spacing: 2px; }
        .brand h2 span { color: var(--neon-blue); }

        /* Dual Input Systems Container */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .upload-zone:hover {
            border-color: var(--neon-purple);
            background: rgba(157, 78, 221, 0.08);
        }
        .upload-zone i { font-size: 28px; color: var(--neon-blue); margin-bottom: 8px; }
        .upload-zone p { font-size: 13px; font-weight: 500; }
        .upload-zone input { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }

        /* Streaming Input Box */
        .stream-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .stream-box h4 { font-size: 12px; text-transform: uppercase; color: var(--neon-pink); margin-bottom: 8px; letter-spacing: 1px;}
        .stream-input-wrap { display: flex; gap: 8px; }
        .stream-input-wrap input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);
            border-radius: 8px; padding: 8px 12px; color: white; font-size: 13px; outline: none;
        }
        .stream-input-wrap input:focus { border-color: var(--neon-blue); }
        .stream-input-wrap button {
            background: var(--accent-gradient); border: none; color: white;
            padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px;
        }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input {
            width: 100%; padding: 10px 14px 10px 42px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass); border-radius: 10px; color: white; font-size: 13px; outline: none;
        }

        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .playlist-header h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .playlist-header span { font-size: 12px; color: var(--neon-purple); font-weight: 600; }

        .playlist-tracks { flex: 1; overflow-y: auto; }
        .track-row {
            display: flex; align-items: center; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 6px;
        }
        .track-row:hover { background: rgba(255, 255, 255, 0.05); }
        .track-row.active { background: rgba(157, 78, 221, 0.15); }
        .row-art {
            width: 36px; height: 36px; border-radius: 6px; background: #1a1a26;
            display: flex; align-items: center; justify-content: center; margin-right: 12px; color: var(--text-muted);
        }
        .track-row.active .row-art { background: var(--accent-gradient); color: white; }
        .row-details { flex: 1; min-width: 0; }
        .row-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-artist { font-size: 11px; color: var(--text-muted); }
        .delete-track-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
        .delete-track-btn:hover { color: var(--neon-pink); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; color: var(--text-muted); gap: 10px; }

        /* ==========================================================================
           MAIN PLAYER AREA
           ========================================================================== */
        .player-main { flex: 1; display: flex; flex-direction: column; padding: 40px; justify-content: space-between; position: relative;}
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .theme-toggle {
            display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-glass); cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .fullscreen-toggle {
            cursor: pointer; width: 36px; height: 36px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-glass);
        }

        .visualizer-container { position: absolute; top: 10%; left: 5%; width: 90%; height: 40%; z-index: 1; pointer-events: none; }
        #visualizer { width: 100%; height: 100%; opacity: 0.5; }

        .now-playing-display { display: flex; flex-direction: column; align-items: center; text-align: center; margin: auto 0; z-index: 10; }
        .album-art-wrapper { position: relative; margin-bottom: 20px; }
        .album-art {
            width: 200px; height: 200px; border-radius: 20px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; font-size: 60px; color: rgba(255,255,255,0.1);
        }
        .playing .album-art { color: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 30px rgba(157, 78, 221, 0.3); }

        .track-meta h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; max-width: 450px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta p { color: var(--text-muted); font-size: 14px; }

        /* ==========================================================================
           CONTROLS DOCK
           ========================================================================== */
        .controls-dock { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); padding: 20px; border-radius: 20px; z-index: 10; }
        .progress-container { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 15px; }
        .time-stamp { font-size: 12px; color: var(--text-muted); width: 45px; font-family: monospace; }
        .progress-bar-wrapper { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; position: relative; cursor: pointer; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent-gradient); border-radius: 3px; }
        
        .buttons-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .utility-controls { width: 50px; display: flex; }
        .core-controls { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover, .ctrl-btn.active { color: var(--text-primary); }
        .ctrl-btn.active { color: var(--neon-blue); }
        
        .ctrl-btn.main-play { width: 50px; height: 50px; border-radius: 50%; background: white; color: black; font-size: 18px; }
        .ctrl-btn.main-play:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px rgba(0, 245, 212, 0.5); }

        .accessory-rack { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 10px; }
        .volume-container { display: flex; align-items: center; gap: 10px; }
        .volume-container input { -webkit-appearance: none; appearance: none; width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        .volume-container input::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: white; cursor: pointer; }

        .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .toast { background: #0f111c; border-left: 4px solid var(--neon-blue); padding: 12px 20px; border-radius: 8px; color: white; font-size: 13px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        @media (max-width: 992px) {
            .app-container { flex-direction: column; height: 95vh; width: 95vw; }
            .sidebar { width: 100%; height: 45%; border-right: none; border-bottom: 1px solid var(--border-glass); padding: 15px; }
            .player-main { height: 55%; padding: 20px; }
            .album-art { width: 120px; height: 120px; font-size: 40px; }
        }
    </style>
</head>
<body class="theme-cyberpunk">
    <div class="bg-gradients">
        <div class="gradient-sphere g1"></div>
        <div class="gradient-sphere g2"></div>
        <div class="gradient-sphere g3"></div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-bolt-lightning"></i>
                <h2>NEON<span>PULSE</span></h2>
            </div>

            <!-- SYSTEM 1: Upload Files -->
            <div class="upload-zone">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Upload Files (MP3, WAV)</p>
                <input type="file" id="file-input" multiple accept="audio/*">
            </div>

            <!-- SYSTEM 2: Stream From Web Box -->
            <div class="stream-box">
                <h4>Stream Web URL / YT</h4>
                <div class="stream-input-wrap">
                    <input type="text" id="stream-input" placeholder="Paste link...">
                    <button id="stream-submit-btn">Load</button>
                </div>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search playlist...">
            </div>

            <div class="playlist-header">
                <h3>Library</h3>
                <span id="track-count">0 tracks</span>
            </div>
            <div class="playlist-tracks" id="playlist-container">
                <div class="empty-state">
                    <i class="fa-solid fa-compact-disc"></i>
                    <p>Playlist empty.</p>
                </div>
            </div>
        </aside>

        <!-- MAIN WINDOW -->
        <main class="player-main">
            <header class="top-nav">
                <div class="theme-toggle" id="theme-btn">
                    <i class="fa-solid fa-palette"></i> <span>Aesthetic</span>
                </div>
                <div class="fullscreen-toggle" id="fullscreen-btn"><i class="fa-solid fa-expand"></i></div>
            </header>

            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div class="now-playing-display">
                <div class="album-art-wrapper">
                    <div class="album-art" id="main-art"><i class="fa-solid fa-music"></i></div>
                </div>
                <div class="track-meta">
                    <h1 id="main-title">NeonPulse Live Engine</h1>
                    <p id="main-artist">Upload local music or paste web streams</p>
                </div>
            </div>

            <div class="controls-dock">
                <div class="progress-container">
                    <span class="time-stamp" id="time-current">0:00</span>
                    <div class="progress-bar-wrapper" id="progress-wrapper">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="time-stamp" id="time-total">0:00</span>
                </div>

                <div class="buttons-container">
                    <div class="utility-controls">
                        <button id="shuffle-btn" class="ctrl-btn"><i class="fa-solid fa-shuffle"></i></button>
                    </div>
                    <div class="core-controls">
                        <button id="prev-btn" class="ctrl-btn"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="play-btn" class="ctrl-btn main-play"><i class="fa-solid fa-play"></i></button>
                        <button id="next-btn" class="ctrl-btn"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                    <div class="utility-controls" style="justify-content: flex-end;">
                        <button id="repeat-btn" class="ctrl-btn"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                </div>

                <div class="accessory-rack">
                    <div class="volume-container">
                        <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <audio id="audio-element" crossorigin="anonymous"></audio>

    <!-- ==========================================================================
       JAVASCRIPT ENGINE WITH FAIL-SAFES
       ========================================================================== -->
    <script>
        class NeonPulsePlayer {
            constructor() {
                this.tracks = [];
                this.currentIndex = -1;
                this.isPlaying = false;
                this.isShuffle = false;
                this.isRepeat = false;

                this.audioCtx = null;
                this.analyser = null;

                this.initElements();
                this.initEvents();
                this.setupCanvas();
                this.showToast("NeonPulse Connected Successfully!");
            }

            initElements() {
                this.audio = document.getElementById('audio-element');
                this.playBtn = document.getElementById('play-btn');
                this.prevBtn = document.getElementById('prev-btn');
                this.nextBtn = document.getElementById('next-btn');
                this.shuffleBtn = document.getElementById('shuffle-btn');
                this.repeatBtn = document.getElementById('repeat-btn');
                this.themeBtn = document.getElementById('theme-btn');
                this.fullscreenBtn = document.getElementById('fullscreen-btn');
                
                this.progressWrapper = document.getElementById('progress-wrapper');
                this.progressFill = document.getElementById('progress-fill');
                this.timeCurrent = document.getElementById('time-current');
                this.timeTotal = document.getElementById('time-total');
                this.volumeSlider = document.getElementById('volume-slider');
                
                this.fileInput = document.getElementById('file-input');
                this.streamInput = document.getElementById('stream-input');
                this.streamSubmitBtn = document.getElementById('stream-submit-btn');
                this.playlistContainer = document.getElementById('playlist-container');
                this.trackCountLabel = document.getElementById('track-count');
                
                this.mainTitle = document.getElementById('main-title');
                this.mainArtist = document.getElementById('main-artist');
                this.nowPlayingDisplay = document.querySelector('.now-playing-display');
                this.canvas = document.getElementById('visualizer');
                this.canvasCtx = this.canvas.getContext('2d');
            }

            initEvents() {
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.prevTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());
                this.shuffleBtn.addEventListener('click', () => { this.isShuffle = !this.isShuffle; this.shuffleBtn.classList.toggle('active', this.isShuffle); });
                this.repeatBtn.addEventListener('click', () => { this.isRepeat = !this.isRepeat; this.repeatBtn.classList.toggle('active', this.isRepeat); });
                
                this.themeBtn.addEventListener('click', () => {
                    document.body.classList.toggle('theme-synthwave');
                    this.showToast("Aesthetic Switched!");
                });
                
                this.fullscreenBtn.addEventListener('click', () => {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
                    else document.exitFullscreen();
                });

                this.audio.addEventListener('timeupdate', () => {
                    if (!this.audio.duration) return;
                    this.progressFill.style.width = `${(this.audio.currentTime / this.audio.duration) * 100}%`;
                    this.timeCurrent.innerText = this.formatTime(this.audio.currentTime);
                });
                this.audio.addEventListener('loadedmetadata', () => this.timeTotal.innerText = this.formatTime(this.audio.duration));
                this.audio.addEventListener('ended', () => this.isRepeat ? (this.audio.currentTime = 0, this.play()) : this.nextTrack());
                
                this.progressWrapper.addEventListener('click', (e) => {
                    if (!this.audio.duration) return;
                    const rect = this.progressWrapper.getBoundingClientRect();
                    this.audio.currentTime = ((e.clientX - rect.left) / rect.width) * this.audio.duration;
                });

                this.volumeSlider.addEventListener('input', (e) => this.audio.volume = e.target.value);
                this.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                
                this.streamSubmitBtn.addEventListener('click', () => this.handleWebStream());
                this.search-input = document.getElementById('search-input');
                this.search-input.addEventListener('input', (e) => this.filterPlaylist(e.target.value));

                window.addEventListener('keydown', (e) => {
                    if (document.activeElement.tagName === 'INPUT') return;
                    if (e.code === 'Space') { e.preventDefault(); this.togglePlay(); }
                });
                window.addEventListener('resize', () => this.setupCanvas());
            }

            handleFiles(fileList) {
                Array.from(fileList).forEach(file => {
                    const trackUrl = URL.createObjectURL(file);
                    this.tracks.push({
                        id: 'local_' + Math.random().toString(36).substr(2, 5),
                        title: file.name.replace(/\.[^/.]+$/, ""),
                        artist: 'Local File',
                        url: trackUrl
                    });
                });
                this.renderPlaylist();
                if (this.currentIndex === -1) this.selectTrack(0, false);
                this.showToast(`Imported ${fileList.length} files!`);
            }

            handleWebStream() {
                let url = this.streamInput.value.trim();
                if (!url) return alert("Paste a valid track URL first!");

                let title = "Web Audio Stream";
                
                // YouTube Converter Processing Bypass Hook
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    let videoId = "";
                    if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                    else videoId = url.split('v=')[1].split('&')[0];
                    url = `https://piper.com.de/api/yt-stream?id=${videoId}`;
                    title = "YouTube Stream Deck";
                }

                this.tracks.push({
                    id: 'stream_' + Math.random().toString(36).substr(2, 5),
                    title: title,
                    artist: 'Internet Stream Source',
                    url: url
                });

                this.streamInput.value = '';
                this.renderPlaylist();
                this.selectTrack(this.tracks.length - 1, true);
            }

            renderPlaylist(list = null) {
                const target = list || this.tracks;
                if(target.length === 0) {
                    this.playlistContainer.innerHTML = '<div class="empty-state"><p>Playlist empty.</p></div>';
                    this.trackCountLabel.innerText = "0 tracks";
                    return;
                }
                this.trackCountLabel.innerText = `${target.length} track(s)`;
                this.playlistContainer.innerHTML = '';
                
                target.forEach((track, index) => {
                    const active = index === this.currentIndex;
                    const row = document.createElement('div');
                    row.className = `track-row ${active ? 'active' : ''}`;
                    row.innerHTML = `
                        <div class="row-art"><i class="fa-solid fa-music"></i></div>
                        <div class="row-details">
                            <div class="row-title">${track.title}</div>
                            <div class="row-artist">${track.artist}</div>
                        </div>
                        <button class="delete-track-btn"><i class="fa-solid fa-trash-can"></i></button>
                    `;
                    row.addEventListener('click', (e) => {
                        if (e.target.closest('.delete-track-btn')) return;
                        this.selectTrack(index, true);
                    });
                    row.querySelector('.delete-track-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.tracks.splice(index, 1);
                        if (this.currentIndex === index) this.audio.src = '';
                        this.renderPlaylist();
                    });
                    this.playlistContainer.appendChild(row);
                });
            }

            selectTrack(index, autostart = true) {
                if (index < 0 || index >= this.tracks.length) return;
                this.currentIndex = index;
                const track = this.tracks[this.currentIndex];
                this.audio.src = track.url;
                this.mainTitle.innerText = track.title;
                this.mainArtist.innerText = track.artist;
                this.renderPlaylist();
                if (autostart) this.play();
            }

            filterPlaylist(q) {
                if(!q.trim()) return this.renderPlaylist();
                this.renderPlaylist(this.tracks.filter(t => t.title.toLowerCase().includes(q.toLowerCase())));
            }

            togglePlay() {
                if (this.currentIndex === -1 && this.tracks.length > 0) return this.selectTrack(0, true);
                if (this.currentIndex === -1) return;
                this.isPlaying ? this.pause() : this.play();
            }

            play() {
                // Highly stable dynamic visualizer audio system hook
                if (!this.audioCtx) this.startVisualizerEngine();
                
                this.audio.play().then(() => {
                    this.isPlaying = true;
                    this.playBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
                    this.nowPlayingDisplay.classList.add('playing');
                }).catch(() => this.showToast("Click track directly to start!"));
            }

            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.playBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                this.nowPlayingDisplay.classList.remove('playing');
            }

            nextTrack() {
                if(this.tracks.length === 0) return;
                let next = this.isShuffle ? Math.floor(Math.random()*this.tracks.length) : this.currentIndex + 1;
                if (next >= this.tracks.length) next = 0;
                this.selectTrack(next, true);
            }

            prevTrack() {
                if(this.tracks.length === 0) return;
                let prev = this.currentIndex - 1;
                if (prev < 0) prev = this.tracks.length - 1;
                this.selectTrack(prev, true);
            }

            formatTime(s) {
                if (isNaN(s)) return "0:00";
                const m = Math.floor(s / 60);
                const r = Math.floor(s % 60);
                return `${m}:${r < 10 ? '0' : ''}${r}`;
            }

            setupCanvas() {
                this.canvas.width = this.canvas.parentElement.clientWidth;
                this.canvas.height = this.canvas.parentElement.clientHeight;
            }

            startVisualizerEngine() {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioCtx.createAnalyser();
                    const source = this.audioCtx.createMediaElementSource(this.audio);
                    source.connect(this.analyser);
                    this.analyser.connect(this.audioCtx.destination);
                    this.analyser.fftSize = 64;
                    this.bufferLength = this.analyser.frequencyBinCount;
                    this.dataArray = new Uint8Array(this.bufferLength);
                    this.renderVisuals();
                } catch(e) { console.log("Visualizer connection bypassed for security limits."); }
            }

            renderVisuals() {
                requestAnimationFrame(() => this.renderVisuals());
                if (!this.analyser) return;
                this.analyser.getByteFrequencyData(this.dataArray);
                this.canvasCtx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const barWidth = this.canvas.width / this.bufferLength;
                let x = 0;
                for(let i=0; i<this.bufferLength; i++) {
                    let h = this.dataArray[i] * 0.8;
                    this.canvasCtx.fillStyle = `rgba(157, 78, 221, ${h/255 + 0.2})`;
                    this.canvasCtx.fillRect(x, this.canvas.height - h, barWidth - 4, h);
                    x += barWidth;
                }
            }

            showToast(msg) {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerText = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => { window.PulseApp = new NeonPulsePlayer(); });
    </script>
</body>
